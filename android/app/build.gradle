plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.gms.google-services'
}


def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '26'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.6'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('app/key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}



android {
    namespace "com.codelabtiger.skysnap"
    compileSdk 36
    compileSdkVersion 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility  JavaVersion.VERSION_17
        targetCompatibility  JavaVersion.VERSION_17
    }

  
    
    packagingOptions {
        exclude "**/librive_text.so"
        // 중복 파일 제외
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
    }

    kotlinOptions {
        jvmTarget =  JavaVersion.VERSION_17
        freeCompilerArgs += [
            "-Xjvm-default=all",
            "-Xopt-in=kotlin.RequiresOptIn"
        ]
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.codelabtiger.skysnap"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk 26
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        //이렇게 하면 x86 아키텍처용 라이브러리를 제외할 수 있습니다.
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            // ProGuard 규칙 파일
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            //압축
             packagingOptions {
                jniLibs {
                    useLegacyPackaging = true
                }
            }
        }
    }

    // 리소스 충돌 해결을 위한 설정 추가
    android.applicationVariants.all { variant ->
        variant.resValue "string", "app_name", "SkySnap"
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24"
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    // fcm setting add
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation "com.google.firebase:firebase-analytics"

    implementation "com.google.firebase:firebase-auth"
    implementation "com.google.firebase:firebase-firestore"

    implementation 'androidx.window:window:1.2.0'
    implementation 'androidx.window:window-java:1.2.0'


    // admob
    implementation("com.google.android.gms:play-services-ads:22.6.0")
    
    //exoplayer
    // implementation 'com.google.android.exoplayer:exoplayer-core:2.19.1'
    // implementation 'com.google.android.exoplayer:exoplayer-dash:2.19.1'
    // implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
    // implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
    // implementation 'com.google.android.exoplayer:exoplayer-smoothstreaming:2.19.1'

     implementation project(':video_player_android')
    

}
