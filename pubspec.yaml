dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon_v10_square.png"
  adaptive_icon_background: "#FF8F8F"
  adaptive_icon_foreground: "assets/icon/app_icon_v10_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/
     - assets/icon/
     - assets/login/
     - assets/images/
     - assets/images/map/
     - assets/lottie/

  # Pretendard: AppTheme.fontFamily가 참조하는 앱 기본 폰트.
  # (기존엔 선언 없이 이름만 지정돼 시스템 폰트로 폴백되고 있었음 — 2026-07-02 번들 추가)
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800

flutter_native_splash:
  # 로딩화면(AuthPage)과 동일한 대각선 그라데이션을 전체 배경으로 사용 → 스플래시가 로딩화면처럼 보임.
  # (background_image는 iOS·Android 11 이하에서 전체 그라데이션 표시. Android 12+는 OS 제약으로
  #  단색 color + 중앙 아이콘만 가능하므로 android_12.color를 그라데이션 중간색 #FF8F8F로 맞춰 이질감 최소화.)
  # ※ color 와 background_image 는 동시 사용 불가(color 우선) → 최상위 color 는 주석 처리해야 그라데이션이 적용됨.
  background_image: assets/icon/splash_bg.png
  image:  assets/icon/app_icon_v10_foreground.png
  android_12:
    image:   assets/icon/app_icon_v10_foreground.png
    color: "#FF8F8F"
    image_dark:   assets/icon/app_icon_v10_foreground.png
    color_dark: "#FF8F8F"

  fullscreen: true
  android: true
  ios: true
  web: false
 

  # android_gravity: center
  # ios_content_mode: center
  # web_image_mode: center

  # android_screen_orientation: portrait

  info_plist_files:
    - 'ios/Runner/Info.plist'

  # Customize the parameters below, and run the following command in the terminal:
  # flutter pub run flutter_native_splash:create
  # To restore Flutter's default white splash screen, run the following command in the terminal:
  # flutter pub run flutter_native_splash:remove
